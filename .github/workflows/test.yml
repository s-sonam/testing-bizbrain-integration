name: AI Workflow
on: [push]

jobs:
  ai:
    runs-on: ubuntu-latest
    steps:
      - name: Call BizBrain Platform
        env:
          BIZBRAIN_API_KEY: ${{ secrets.BIZBRAIN_API_KEY }}
        run: |
          if [ -z "$BIZBRAIN_API_KEY" ]; then
          echo "API key is EMPTY"
          exit 1
          else
            echo "API key exists"
            echo "Length: ${#BIZBRAIN_API_KEY}"
          fi
          curl https://platform.bizbrain.app/api/v1/chat/completions \
            -H "Authorization: Bearer $BIZBRAIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "DeepSeek-V4-Pro",
              "messages": [{"role": "user", "content": "Hello from CI!"}]
            }'
