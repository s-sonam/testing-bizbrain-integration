name: AI Workflow
on: [push]

jobs:
  ai:
    runs-on: ubuntu-latest
    steps:
      - name: Call BizBrain Platform
        env:
          BIZBRAIN_API_KEY: ${{ secrets.BIZBRAIN_API_KEY }}
        run: |
          curl https://platform.bizbrain.app/api/v1/chat/completions \
            -H "Authorization: Bearer $BIZBRAIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "Qwen/Qwen3.6-35B-A3B-FP8",
              "messages": [{"role": "user", "content": "Hello from CI!"}]
            }'
